apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-server
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: mcp-server
rules:
  # Core resources - full access for kubectl operations
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - services
      - endpoints
      - configmaps
      - secrets
      - persistentvolumeclaims
      - events
      - resourcequotas
      - limitranges
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

  # Core resources - read-only
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
      - persistentvolumes
    verbs: ["get", "list", "watch"]

  # Apps API group
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

  # Scale subresources
  - apiGroups: ["apps"]
    resources:
      - deployments/scale
      - statefulsets/scale
      - replicasets/scale
    verbs: ["get", "patch", "update"]

  # Batch API group
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

  # Autoscaling API group
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

  # Networking API group
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

  # Admission registration — needed for problems that simulate admission
  # webhook outages (e.g., admission_webhook_outage_*). Excludes create so
  # the framework still controls when webhook configs appear.
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - validatingwebhookconfigurations
      - mutatingwebhookconfigurations
    verbs: ["get", "list", "watch", "delete", "patch", "update"]

  # RBAC (read-only)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterroles
    verbs: ["get", "list", "watch", "patch", "update"]

  # RBAC bindings remain read-only.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterrolebindings
      - roles
      - rolebindings
    verbs: ["get", "list", "watch"]

  # Metrics API - allows kubectl top pods/nodes
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]

  # Custom resources (TiDB)
  - apiGroups: ["pingcap.com"]
    resources:
      - tidbclusters
    verbs: ["get", "list", "watch", "patch", "update"]

  # Calico CRDs — allows diagnosing and fixing CNI/IPAM networking issues
  - apiGroups: ["crd.projectcalico.org"]
    resources:
      - ippools
      - ipamconfigs
      - ipamblocks
      - ipamhandles
      - ipreservations
      - blockaffinities
      - felixconfigurations
      - clusterinformations
      - caliconodestatuses
      - networkpolicies
      - globalnetworkpolicies
      - networksets
      - globalnetworksets
    verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
