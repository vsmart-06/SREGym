name: Problem Validation

# Validates a single contributed problem end-to-end:
#   deploy app -> inject fault -> oracle fails -> recover fault -> oracle passes
#
# Opt-in: validation runs only when a "/validate-problem <problem_id>" line is
# present — either in the PR description, in a PR comment (so a reviewer can run
# it when the contributor forgot), or via the workflow_dispatch input. PRs with
# no such line are unaffected: no kind cluster, no comment.
#
# Gate: the `lint` job fails a PR that changes files under
# sregym/conductor/problems/ unless a /validate-problem line exists in the PR
# description or a comment, so changes must consciously opt in or "skip".

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, edited]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      problem_id:
        description: "Problem ID to validate (key in problems/registry.py)"
        required: true
        type: string

concurrency:
  # Include event_name so issue_comment runs aren't cancelled by pull_request
  # events on the same PR (notably fork PRs whose pull_request runs sit at
  # action_required and never actually execute).
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate: changing a problem requires opting in (or explicitly skipping) ──
  lint:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/validate-problem'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Require /validate-problem for problem changes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          set -euo pipefail

          # PR metadata: changed files, description, and conversation comments.
          data=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json files,body,comments)

          changed=$(printf '%s' "$data" | jq -r '.files[].path' \
            | grep -E '^sregym/conductor/problems/' || true)

          if [ -z "$changed" ]; then
            echo "::notice::No files under sregym/conductor/problems/ changed — nothing to enforce."
            exit 0
          fi

          echo "Problem files changed in this PR:"
          printf '%s\n' "$changed" | sed 's/^/  /'

          # Satisfied by a /validate-problem line in the description OR any comment.
          if printf '%s' "$data" | jq -r '.body // "", (.comments[].body // "")' \
            | grep -iqE '^[[:space:]]*/validate-problem[[:space:]:]+'; then
            echo "::notice::Found a /validate-problem line — requirement satisfied."
            exit 0
          fi

          echo "::error::This PR changes problem files but has no '/validate-problem' line in its description or comments."
          cat <<'EOF'

          ────────────────────────────────────────────────────────────────────
          This PR modifies files under sregym/conductor/problems/ but does not
          opt in to automated problem validation.

          Add ONE of these lines — in the PR description, or as a PR comment
          (a reviewer can do this) — then this check re-runs:

            /validate-problem <problem_id>   run end-to-end validation
            /validate-problem skip           explicitly skip — e.g. a refactor,
                                             a registry/base.py change, or a
                                             Khaos-only problem that cannot run
                                             on the CI kind cluster

          See CONTRIBUTING.md → "Adding New Problems".
          ────────────────────────────────────────────────────────────────────
          EOF
          exit 1

  # ── Resolve the problem ID from the PR body / comment / dispatch input ──
  resolve:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/validate-problem'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.parse.outputs.should_run }}
      problem_id: ${{ steps.parse.outputs.problem_id }}
      pr_number: ${{ steps.parse.outputs.pr_number }}
      checkout_ref: ${{ steps.parse.outputs.checkout_ref }}
      skip_reason: ${{ steps.parse.outputs.skip_reason }}
    steps:
      - name: Determine problem ID
        id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER_PR: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_ASSOC: ${{ github.event.comment.author_association }}
          DISPATCH_ID: ${{ github.event.inputs.problem_id }}
        run: |
          set -euo pipefail
          should_run=false
          problem_id=""
          skip_reason=""
          pr_number=""
          checkout_ref=""
          raw=""
          source="the PR description"

          case "$EVENT_NAME" in
            workflow_dispatch)
              raw="$DISPATCH_ID"
              ;;
            pull_request)
              pr_number="$PR_NUMBER_PR"
              raw=$(printf '%s\n' "$PR_BODY" \
                | grep -iE '^[[:space:]]*/validate-problem[[:space:]:]+' \
                | head -n1 \
                | sed -E 's#^[[:space:]]*/validate-problem[[:space:]:]+##I' || true)
              ;;
            issue_comment)
              pr_number="$ISSUE_NUMBER"
              # Use the /merge ref (PR merged into current main) — not /head —
              # so the validation harness and other main-only files are present
              # even when the PR branch predates them. A PR with merge conflicts
              # has no /merge ref and checkout will fail with a clear error.
              checkout_ref="refs/pull/${pr_number}/merge"
              source="the triggering comment"
              # Comment triggers run expensive CI — restrict to write-access users.
              case "$COMMENT_ASSOC" in
                OWNER|MEMBER|COLLABORATOR) ;;
                *)
                  skip_reason="comment trigger ignored — author association '$COMMENT_ASSOC' lacks write access"
                  ;;
              esac
              if [ -z "$skip_reason" ]; then
                raw=$(printf '%s\n' "$COMMENT_BODY" \
                  | grep -iE '^[[:space:]]*/validate-problem[[:space:]:]+' \
                  | head -n1 \
                  | sed -E 's#^[[:space:]]*/validate-problem[[:space:]:]+##I' || true)
              fi
              ;;
          esac

          # First token is the problem ID (or a skip keyword); ignore trailing text.
          problem_id=$(printf '%s' "$raw" | awk '{print $1}')
          problem_id=${problem_id//\`/}
          problem_id=${problem_id//\"/}
          problem_id=${problem_id//\'/}

          if [ -z "$skip_reason" ]; then
            case "$(printf '%s' "$problem_id" | tr '[:upper:]' '[:lower:]')" in
              "")
                skip_reason="no '/validate-problem <id>' line found in $source"
                ;;
              skip|none|n/a|na)
                skip_reason="validation explicitly skipped via '/validate-problem $problem_id'"
                ;;
              *)
                should_run=true
                ;;
            esac
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "problem_id=$problem_id" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$skip_reason" >> "$GITHUB_OUTPUT"

          if [ "$should_run" = "true" ]; then
            echo "::notice::Problem validation will run for '$problem_id'"
          else
            echo "::notice::Problem validation skipped — $skip_reason"
          fi

  # ── Deploy, inject, recover, and check the oracle ──────────────────────
  validate:
    needs: resolve
    if: needs.resolve.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
    steps:
      # ── Checkout (PR merged with main; default ref for pull_request/dispatch) ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}
          submodules: recursive
          fetch-depth: 0

      - name: Record checked-out commit
        id: gitsha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # ── Cluster tooling ───────────────────────────────────────────────
      - name: Install Kind
        run: |
          curl -Lo /tmp/kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          chmod +x /tmp/kind
          sudo mv /tmp/kind /usr/local/bin/kind
          kind version

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Pre-pull kind node image
        run: docker pull jacksonarthurclark/aiopslab-kind-x86:latest

      - name: Prepare /run/udev for OpenEBS NDM
        run: sudo mkdir -p /run/udev

      - name: Create kind cluster
        run: |
          kind create cluster --config kind/kind-config-x86.yaml --wait 5m
          kubectl cluster-info
          kubectl get nodes -o wide

      # ── Python environment ────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      # ── Run the problem lifecycle validation ──────────────────────────
      - name: Validate problem
        id: validate
        env:
          PROBLEM_ID: ${{ needs.resolve.outputs.problem_id }}
        run: |
          uv run python tests/integration/validate_problem.py \
            --problem "$PROBLEM_ID" \
            --summary "$GITHUB_WORKSPACE/validation-summary.md"

      # ── Diagnostics on failure ────────────────────────────────────────
      - name: Dump cluster diagnostics
        if: failure()
        run: |
          echo "=== Cluster Info ==="
          kubectl cluster-info || true
          echo "=== All Pods (all namespaces) ==="
          kubectl get pods -A -o wide || true
          echo "=== Pod Descriptions (non-Running) ==="
          kubectl get pods -A --no-headers | grep -v Running | awk '{print $1, $2}' | \
            while read ns pod; do
              echo "--- $ns/$pod ---"
              kubectl describe pod "$pod" -n "$ns" 2>/dev/null | tail -30
            done || true
          echo "=== Recent Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -50 || true

      - name: Export kind logs
        if: failure()
        run: kind export logs /tmp/kind-logs || true

      - name: Upload kind logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kind-logs
          path: /tmp/kind-logs/
          if-no-files-found: ignore

      # ── Publish the result ────────────────────────────────────────────
      - name: Upload validation summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-summary
          path: validation-summary.md
          if-no-files-found: warn

      - name: Post validation result comment
        # Non-fatal: fork PRs get a read-only token and cannot comment. The check
        # status still reflects the validation result regardless.
        if: always() && needs.resolve.outputs.pr_number != ''
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          COMMIT_SHA: ${{ steps.gitsha.outputs.sha }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- problem-validation -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body;
            try {
              body = fs.readFileSync(`${process.env.GITHUB_WORKSPACE}/validation-summary.md`, 'utf8');
            } catch (e) {
              body = `${marker}\n## 🧪 Problem Validation\n\n**Result: ❌ FAILED**\n\n` +
                `The validation run did not produce a summary — it likely crashed before ` +
                `completing. Check the [workflow logs](${runUrl}).`;
            }
            body += `\n\n_[Workflow run](${runUrl}) · commit \`${process.env.COMMIT_SHA}\`_`;

            const { owner, repo } = context.repo;
            const issue_number = Number(process.env.PR_NUMBER);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
