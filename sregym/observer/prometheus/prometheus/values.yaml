# yaml-language-server: $schema=values.schema.json
# Default values for prometheus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

rbac:
  create: true

podSecurityPolicy:
  enabled: false

imagePullSecrets: []
# - name: "image-pull-secret"

## Define serviceAccount names for components. Defaults to component's fully qualified name.
##
serviceAccounts:
  server:
    create: true
    name: ""
    annotations: {}
    # automountServiceAccountToken:

## Additional labels to attach to all resources
commonMetaLabels: {}

## Monitors ConfigMap changes and POSTs to a URL
## Ref: https://github.com/prometheus-operator/prometheus-operator/tree/main/cmd/prometheus-config-reloader
##
configmapReload:
  ## URL for configmap-reload to use for reloads
  ##
  reloadUrl: ""

  ## env sets environment variables to pass to the container. Can be set as name/value pairs,
  ## read from secrets or configmaps.
  env: []
    # - name: SOMEVAR
    #   value: somevalue
    # - name: PASSWORD
    #   valueFrom:
    #     secretKeyRef:
    #       name: mysecret
    #       key: password
    #       optional: false

  prometheus:
    ## If false, the configmap-reload container will not be deployed
    ##
    enabled: true

    ## configmap-reload container name
    ##
    name: configmap-reload

    ## configmap-reload container image
    ##
    image:
      repository: quay.io/prometheus-operator/prometheus-config-reloader
      tag: v0.67.0
      # When digest is set to a non-empty value, images will be pulled by digest (regardless of tag value).
      digest: ""
      pullPolicy: IfNotPresent

    # containerPort: 9533

    ## Additional configmap-reload container arguments
    ##
    extraArgs: {}

    ## Additional configmap-reload volume directories
    ##
    extraVolumeDirs: []

    ## Additional configmap-reload volume mounts
    ##
    extraVolumeMounts: []

    ## Additional configmap-reload mounts
    ##
    extraConfigmapMounts: []
      # - name: prometheus-alerts
      #   mountPath: /etc/alerts.d
      #   subPath: ""
      #   configMap: prometheus-alerts
      #   readOnly: true

    ## Security context to be added to configmap-reload container
    containerSecurityContext: {}

    ## configmap-reload resource requests and limits
    ## Ref: http://kubernetes.io/docs/user-guide/compute-resources/
    ##
    resources: {}

server:
  ## Prometheus server container name
  ##
  name: server

  ## Use a ClusterRole (and ClusterRoleBinding)
  ## - If set to false - we define a RoleBinding in the defined namespaces ONLY
  ##
  ## NB: because we need a Role with nonResourceURL's ("/metrics") - you must get someone with Cluster-admin privileges to define this role for you, before running with this setting enabled.
  ##     This makes prometheus work - for users who do not have ClusterAdmin privs, but wants prometheus to operate on their own namespaces, instead of clusterwide.
  ##
  ## You MUST also set namespaces to the ones you have access to and want monitored by Prometheus.
  ##
  # useExistingClusterRoleName: nameofclusterrole

  ## If set it will override prometheus.server.fullname value for ClusterRole and ClusterRoleBinding
  ##
  clusterRoleNameOverride: ""

  # Enable only the release namespace for monitoring. By default all namespaces are monitored.
  # If releaseNamespace and namespaces are both set a merged list will be monitored.
  releaseNamespace: false

  # namespaces to monitor (instead of monitoring all - clusterwide). Needed if you want to run without Cluster-admin privileges.
  # namespaces:
  #   - astronomy-shop

  # sidecarContainers - add more containers to prometheus server
  # Key/Value where Key is the sidecar `- name: <Key>`
  # Example:
  #   sidecarContainers:
  #      webserver:
  #        image: nginx
  # OR for adding OAuth authentication to Prometheus
  #   sidecarContainers:
  #     oauth-proxy:
  #       image: quay.io/oauth2-proxy/oauth2-proxy:v7.1.2
  #       args:
  #       - --upstream=http://127.0.0.1:9090
  #       - --http-address=0.0.0.0:8081
  #       - ...
  #       ports:
  #       - containerPort: 8081
  #         name: oauth-proxy
  #         protocol: TCP
  #       resources: {}
  sidecarContainers: {}

  # sidecarTemplateValues - context to be used in template for sidecarContainers
  # Example:
  #   sidecarTemplateValues: *your-custom-globals
  #   sidecarContainers:
  #     webserver: |-
  #       {{ include "webserver-container-template" . }}
  # Template for `webserver-container-template` might looks like this:
  #   image: "{{ .Values.server.sidecarTemplateValues.repository }}:{{ .Values.server.sidecarTemplateValues.tag }}"
  #   ...
  #
  sidecarTemplateValues: {}

  ## Prometheus server container image
  ##
  image:
    repository: quay.io/prometheus/prometheus
    # if not set appVersion field from Chart.yaml is used
    tag: ""
    # When digest is set to a non-empty value, images will be pulled by digest (regardless of tag value).
    digest: ""
    pullPolicy: IfNotPresent

  ## Prometheus server command
  ##
  command: []

  ## prometheus server priorityClassName
  ##
  priorityClassName: ""

  ## EnableServiceLinks indicates whether information about services should be injected
  ## into pod's environment variables, matching the syntax of Docker links.
  ## WARNING: the field is unsupported and will be skipped in K8s prior to v1.13.0.
  ##
  enableServiceLinks: true

  ## The URL prefix at which the container can be accessed. Useful in the case the '-web.external-url' includes a slug
  ## so that the various internal URLs are still able to access as they are in the default case.
  ## (Optional)
  prefixURL: ""

  ## External URL which can access prometheus
  ## Maybe same with Ingress host name
  baseURL: ""

  ## Additional server container environment variables
  ##
  ## You specify this manually like you would a raw deployment manifest.
  ## This means you can bind in environment variables from secrets.
  ##
  ## e.g. static environment variable:
  ##  - name: DEMO_GREETING
  ##    value: "Hello from the environment"
  ##
  ## e.g. secret environment variable:
  ## - name: USERNAME
  ##   valueFrom:
  ##     secretKeyRef:
  ##       name: mysecret
  ##       key: username
  env: []

  # List of flags to override default parameters, e.g:
  # - --enable-feature=agent
  # - --storage.agent.retention.max-time=30m
  # - --config.file=/etc/config/prometheus.yml
  defaultFlagsOverride: []

  extraFlags:
    - web.enable-lifecycle
    ## web.enable-admin-api flag controls access to the administrative HTTP API which includes functionality such as
    ## deleting time series. This is disabled by default.
    # - web.enable-admin-api
    ##
    ## storage.tsdb.no-lockfile flag controls BD locking
    # - storage.tsdb.no-lockfile
    ##
    ## storage.tsdb.wal-compression flag enables compression of the write-ahead log (WAL)
    # - storage.tsdb.wal-compression

  ## Path to a configuration file on prometheus server container FS
  configPath: /etc/config/prometheus.yml

  ### The data directory used by prometheus to set --storage.tsdb.path
  ### When empty server.persistentVolume.mountPath is used instead
  storagePath: ""

  global:
    ## How frequently to scrape targets by default
    ##
    scrape_interval: 1m
    ## How long until a scrape request times out
    ##
    scrape_timeout: 10s
    ## How frequently to evaluate rules
    ##
    evaluation_interval: 1m
  ## https://prometheus.io/docs/prometheus/latest/configuration/configuration/#remote_write
  ##
  remoteWrite: []
  ## https://prometheus.io/docs/prometheus/latest/configuration/configuration/#remote_read
  ##
  remoteRead: []

  ## https://prometheus.io/docs/prometheus/latest/configuration/configuration/#tsdb
  ##
  tsdb: {}
    # out_of_order_time_window: 0s

  ## https://prometheus.io/docs/prometheus/latest/configuration/configuration/#exemplars
  ## Must be enabled via --enable-feature=exemplar-storage
  ##
  exemplars: {}
    # max_exemplars: 100000

  ## Custom HTTP headers for Liveness/Readiness/Startup Probe
  ##
  ## Useful for providing HTTP Basic Auth to healthchecks
  probeHeaders: []
    # - name: "Authorization"
    #   value: "Bearer ABCDEabcde12345"

  ## Additional Prometheus server container arguments
  ##
  extraArgs: {}

  ## Additional InitContainers to initialize the pod
  ##
  extraInitContainers: []

  ## Additional Prometheus server Volume mounts
  ##
  extraVolumeMounts: []

  ## Additional Prometheus server Volumes
  ##
  extraVolumes: []

  ## Additional Prometheus server hostPath mounts
  ##
  extraHostPathMounts: []
    # - name: certs-dir
    #   mountPath: /etc/kubernetes/certs
    #   subPath: ""
    #   hostPath: /etc/kubernetes/certs
    #   readOnly: true

  extraConfigmapMounts: []
    # - name: certs-configmap
    #   mountPath: /prometheus
    #   subPath: ""
    #   configMap: certs-configmap
    #   readOnly: true

  ## Additional Prometheus server Secret mounts
  # Defines additional mounts with secrets. Secrets must be manually created in the namespace.
  extraSecretMounts: []
    # - name: secret-files
    #   mountPath: /etc/secrets
    #   subPath: ""
    #   secretName: prom-secret-files
    #   readOnly: true

  ## ConfigMap override where fullname is {{.Release.Name}}-{{.Values.server.configMapOverrideName}}
  ## Defining configMapOverrideName will cause templates/server-configmap.yaml
  ## to NOT generate a ConfigMap resource
  ##
  configMapOverrideName: ""

  ## Extra labels for Prometheus server ConfigMap (ConfigMap that holds serverFiles)
  extraConfigmapLabels: {}

  ingress:
    ## If true, Prometheus server Ingress will be created
    ##
    enabled: false

    # For Kubernetes >= 1.18 you should specify the ingress-controller via the field ingressClassName
    # See https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/#specifying-the-class-of-an-ingress
    # ingressClassName: nginx

    ## Prometheus server Ingress annotations
    ##
    annotations: {}
    #   kubernetes.io/ingress.class: nginx
    #   kubernetes.io/tls-acme: 'true'

    ## Prometheus server Ingress additional labels
    ##
    extraLabels: {}

    ## Redirect ingress to an additional defined port on the service
    # servicePort: 8081

    ## Prometheus server Ingress hostnames with optional path
    ## Must be provided if Ingress is enabled
    ##
    hosts: []
    #   - prometheus.domain.com
    #   - domain.com/prometheus

    path: /

    # pathType is only for k8s >= 1.18
    pathType: Prefix

    ## Extra paths to prepend to every host configuration. This is useful when working with annotation based services.
    extraPaths: []
    # - path: /*
    #   backend:
    #     serviceName: ssl-redirect
    #     servicePort: use-annotation

    ## Prometheus server Ingress TLS configuration
    ## Secrets must be manually created in the namespace
    ##
    tls: []
    #   - secretName: prometheus-server-tls
    #     hosts:
    #       - prometheus.domain.com

  ## Server Deployment Strategy type
  strategy:
    type: Recreate

  ## hostAliases allows adding entries to /etc/hosts inside the containers
  hostAliases: []
  #   - ip: "127.0.0.1"
  #     hostnames:
  #       - "example.com"

  ## Node tolerations for server scheduling to nodes with taints
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
  ##
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  ## Node labels for Prometheus server pod assignment
  ## Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  ##
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""

  ## Pod affinity
  ##
  affinity: {}

  ## Pod topology spread constraints
  ## ref. https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
  topologySpreadConstraints: []

  ## PodDisruptionBudget settings
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/disruptions/
  ##
  podDisruptionBudget:
    enabled: false
    maxUnavailable: 1
    # minAvailable: 1
    ## unhealthyPodEvictionPolicy is available since 1.27.0 (beta)
    ## https://kubernetes.io/docs/tasks/run-application/configure-pdb/#unhealthy-pod-eviction-policy
    # unhealthyPodEvictionPolicy: IfHealthyBudget

  ## Use an alternate scheduler, e.g. "stork".
  ## ref: https://kubernetes.io/docs/tasks/administer-cluster/configure-multiple-schedulers/
  ##
  # schedulerName:

  persistentVolume:
    ## If true, Prometheus server will create/use a Persistent Volume Claim
    ## If false, use emptyDir
    ##
    enabled: true

    ## If set it will override the name of the created persistent volume claim
    ## generated by the stateful set.
    ##
    statefulSetNameOverride: ""

    ## Prometheus server data Persistent Volume access modes
    ## Must match those of existing PV or dynamic provisioner
    ## Ref: http://kubernetes.io/docs/user-guide/persistent-volumes/
    ##
    accessModes:
      - ReadWriteOnce

    ## Prometheus server data Persistent Volume labels
    ##
    labels: {}

    ## Prometheus server data Persistent Volume annotations
    ##
    annotations: {}

    ## Prometheus server data Persistent Volume existing claim name
    ## Requires server.persistentVolume.enabled: true
    ## If defined, PVC must be created manually before volume will be bound
    existingClaim: ""

    ## Prometheus server data Persistent Volume mount root path
    ##
    mountPath: /data

    ## Prometheus server data Persistent Volume size
    ##
    size: 8Gi

    ## Prometheus server data Persistent Volume Storage Class
    ## If defined, storageClassName: <storageClass>
    ## If set to "-", storageClassName: "", which disables dynamic provisioning
    ## If undefined (the default) or set to null, no storageClassName spec is
    ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
    ##   GKE, AWS & OpenStack)
    ## yinfang
    storageClass: "openebs-hostpath"

    ## Prometheus server data Persistent Volume Binding Mode
    ## If defined, volumeBindingMode: <volumeBindingMode>
    ## If undefined (the default) or set to null, no volumeBindingMode spec is
    ##   set, choosing the default mode.
    ##
    # volumeBindingMode: ""

    ## Subdirectory of Prometheus server data Persistent Volume to mount
    ## Useful if the volume's root directory is not empty
    ##
    subPath: ""

    ## Persistent Volume Claim Selector
    ## Useful if Persistent Volumes have been provisioned in advance
    ## Ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/#selector
    ##
    # selector:
    #  matchLabels:
    #    release: "stable"
    #  matchExpressions:
    #    - { key: environment, operator: In, values: [ dev ] }

    ## Persistent Volume Name
    ## Useful if Persistent Volumes have been provisioned in advance and you want to use a specific one
    ## yinfang
    #volumeName: "prometheus-pv" # Changed in order to use PVC

  emptyDir:
    ## Prometheus server emptyDir volume size limit
    ##
    sizeLimit: ""

  ## Annotations to be added to Prometheus server pods
  ##
  podAnnotations: {}
    # iam.amazonaws.com/role: prometheus

  ## Labels to be added to Prometheus server pods
  ##
  podLabels: {}

  ## Prometheus AlertManager configuration
  ##
  alertmanagers: []

  ## Specify if a Pod Security Policy for node-exporter must be created
  ## Ref: https://kubernetes.io/docs/concepts/policy/pod-security-policy/
  ##
  podSecurityPolicy:
    annotations: {}
      ## Specify pod annotations
      ## Ref: https://kubernetes.io/docs/concepts/policy/pod-security-policy/#apparmor
      ## Ref: https://kubernetes.io/docs/concepts/policy/pod-security-policy/#seccomp
      ## Ref: https://kubernetes.io/docs/concepts/policy/pod-security-policy/#sysctl
      ##
      # seccomp.security.alpha.kubernetes.io/allowedProfileNames: '*'
      # seccomp.security.alpha.kubernetes.io/defaultProfileName: 'docker/default'
      # apparmor.security.beta.kubernetes.io/defaultProfileName: 'runtime/default'

  ## Use a StatefulSet if replicaCount needs to be greater than 1 (see below)
  ##
  replicaCount: 1

  ## Number of old history to retain to allow rollback
  ## Default Kubernetes value is set to 10
  ##
  revisionHistoryLimit: 10

  ## Annotations to be added to deployment
  ##
  deploymentAnnotations: {}

  statefulSet:
    ## If true, use a statefulset instead of a deployment for pod management.
    ## This allows to scale replicas to more than 1 pod
    ##
    enabled: false

    annotations: {}
    labels: {}
    podManagementPolicy: OrderedReady

    ## Alertmanager headless service to use for the statefulset
    ##
    headless:
      annotations: {}
      labels: {}
      servicePort: 80
      ## Enable gRPC port on service to allow auto discovery with thanos-querier
      gRPC:
        enabled: false
        servicePort: 10901
        # nodePort: 10901

    ## Statefulset's persistent volume claim retention policy
    ## pvcDeleteOnStsDelete and pvcDeleteOnStsScale determine whether
    ## statefulset's PVCs are deleted (true) or retained (false) on scaling down
    ## and deleting statefulset, respectively. Requires 1.27.0+.
    ## Ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#persistentvolumeclaim-retention
    ##
    pvcDeleteOnStsDelete: false
    pvcDeleteOnStsScale: false

  ## Prometheus server readiness and liveness probe initial delay and timeout
  ## Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
  ##
  tcpSocketProbeEnabled: false
  probeScheme: HTTP
  readinessProbeInitialDelay: 30
  readinessProbePeriodSeconds: 5
  readinessProbeTimeout: 4
  readinessProbeFailureThreshold: 3
  readinessProbeSuccessThreshold: 1
  livenessProbeInitialDelay: 30
  livenessProbePeriodSeconds: 15
  livenessProbeTimeout: 10
  livenessProbeFailureThreshold: 3
  livenessProbeSuccessThreshold: 1
  startupProbe:
    enabled: false
    periodSeconds: 5
    failureThreshold: 30
    timeoutSeconds: 10

  ## Prometheus server resource requests and limits
  ## Ref: http://kubernetes.io/docs/user-guide/compute-resources/
  ##
  resources: {}
    # limits:
    #   cpu: 500m
    #   memory: 512Mi
    # requests:
    #   cpu: 500m
    #   memory: 512Mi

  # Required for use in managed kubernetes clusters (such as AWS EKS) with custom CNI (such as calico),
  # because control-plane managed by AWS cannot communicate with pods' IP CIDR and admission webhooks are not working
  ##
  hostNetwork: false

  # When hostNetwork is enabled, this will set to ClusterFirstWithHostNet automatically
  dnsPolicy: ClusterFirst

  # Use hostPort
  # hostPort: 9090

  # Use portName
  portName: ""

  ## Vertical Pod Autoscaler config
  ## Ref: https://github.com/kubernetes/autoscaler/tree/master/vertical-pod-autoscaler
  verticalAutoscaler:
    ## If true a VPA object will be created for the controller (either StatefulSet or Deployemnt, based on above configs)
    enabled: false
    # updateMode: "Auto"
    # containerPolicies:
    # - containerName: 'prometheus-server'

  # Custom DNS configuration to be added to prometheus server pods
  dnsConfig: {}
    # nameservers:
    #   - 1.2.3.4
    # searches:
    #   - ns1.svc.cluster-domain.example
    #   - my.dns.search.suffix
    # options:
    #   - name: ndots
    #     value: "2"
  #   - name: edns0

  ## Security context to be added to server pods
  ##
  securityContext:
    runAsUser: 65534
    runAsNonRoot: true
    runAsGroup: 65534
    fsGroup: 65534

  ## Security context to be added to server container
  ##
  containerSecurityContext: {}

  service:
    ## If false, no Service will be created for the Prometheus server
    ##
    enabled: true

    annotations: {}
    labels: {}
    clusterIP: ""

    ## List of IP addresses at which the Prometheus server service is available
    ## Ref: https://kubernetes.io/docs/concepts/services-networking/service/#external-ips
    ##
    externalIPs: []

    loadBalancerIP: ""
    loadBalancerSourceRanges: []
    servicePort: 80
    sessionAffinity: None
    # type: ClusterIP
    # yinfang
    type: NodePort
    nodePort: 32000


    ## Enable gRPC port on service to allow auto discovery with thanos-querier
    gRPC:
      enabled: false
      servicePort: 10901
      # nodePort: 10901

    ## If using a statefulSet (statefulSet.enabled=true), configure the
    ## service to connect to a specific replica to have a consistent view
    ## of the data.
    statefulsetReplica:
      enabled: false
      replica: 0

    ## Additional port to define in the Service
    additionalPorts: []
    # additionalPorts:
    # - name: authenticated
    #   port: 8081
    #   targetPort: 8081

  ## Prometheus server pod termination grace period
  ##
  terminationGracePeriodSeconds: 300

  ## Prometheus data retention period (default if not specified is 15 days)
  ##
  retention: "15d"

  ## Prometheus' data retention size. Supported units: B, KB, MB, GB, TB, PB, EB.
  ##
  retentionSize: ""

## Prometheus server ConfigMap entries for rule files (allow prometheus labels interpolation)
ruleFiles: {}

## Prometheus server ConfigMap entries for scrape_config_files
## (allows scrape configs defined in additional files)
##
scrapeConfigFiles: []

## Prometheus server ConfigMap entries
##
serverFiles:
  ## Alerts configuration
  ## Ref: https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules/
  alerting_rules.yml:
      groups:
        # ---- App namespace pod lifecycle alerts ----
        # Namespaces: astronomy-shop, hotel-reservation, social-network, blueprint-hotel-reservation, train-ticket, tidb-cluster
        - name: app.workloads
          rules:
            - alert: PodStatusError
              expr: |
                sum by (namespace, pod, reason) (
                  kube_pod_container_status_waiting_reason{namespace=~"astronomy-shop|hotel-reservation|social-network|blueprint-hotel-reservation|train-ticket|tidb-cluster"} > 0
                )
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "Pod startup failure: {{ $labels.pod }}"
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is stuck in {{ $labels.reason }}."

            - alert: FailedPodsDetected
              expr: |
                sum by (namespace, pod) (
                  kube_pod_status_phase{namespace=~"astronomy-shop|hotel-reservation|social-network|blueprint-hotel-reservation|train-ticket|tidb-cluster", phase="Failed"}
                ) > 0
              for: 1m
              labels:
                severity: critical
              annotations:
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is in Failed state."

            - alert: PendingPodsDetected
              expr: |
                sum by (namespace, pod) (
                  kube_pod_status_phase{namespace=~"astronomy-shop|hotel-reservation|social-network|blueprint-hotel-reservation|train-ticket|tidb-cluster", phase="Pending"}
                ) > 0
              for: 1m
              labels:
                severity: critical
              annotations:
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is stuck in Pending state."

            - alert: PodSchedulingFailure
              expr: |
                sum by (namespace, pod) (
                  kube_pod_status_unschedulable{namespace=~"astronomy-shop|hotel-reservation|social-network|blueprint-hotel-reservation|train-ticket|tidb-cluster"}
                ) > 0
              for: 30s
              labels:
                severity: critical
              annotations:
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is unschedulable."

            - alert: KubePodNotReady
              # Exclude completed/succeeded pods (e.g. finished Jobs).
              expr: |
                sum by (namespace, pod) (
                  kube_pod_status_ready{namespace=~"astronomy-shop|hotel-reservation|social-network|blueprint-hotel-reservation|train-ticket|tidb-cluster", condition="false"}
                ) > 0
                unless on (namespace, pod)
                (kube_pod_status_phase{phase="Succeeded"} > 0)
              for: 1m
              labels:
                severity: critical
              annotations:
                description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for more than 1 minute."

            - alert: TiDBInstanceNotReady
              expr: |
                (tidb_server_connections == 0 or absent(tidb_server_connections))
                  and on ()
                (count(kube_namespace_labels{namespace="tidb-cluster"}) > 0)
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "TiDB instance is not ready"
                description: "TiDB instance {{ $labels.instance }} has been unreachable or has no connections for more than 2 minutes."

            - alert: TiDBStatefulSetNotReady
              expr: group by (statefulset) (kube_statefulset_replicas{namespace="tidb-cluster"} - kube_statefulset_status_replicas_ready) > 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "TiDB StatefulSet {{ $labels.statefulset }} not ready"
                description: "StatefulSet {{ $labels.statefulset }} has {{ $value }} ready replicas but desired is higher"

        # ---- Container resource alerts ----
        - name: app.resources
          rules:
            - alert: ContainerCPUThrottling
              # Fires when >25% of CPU periods are throttled (container hitting its limit).
              expr: |
                sum by (namespace, pod, container) (
                  rate(container_cpu_cfs_throttled_periods_total{
                    namespace=~"astronomy-shop|hotel-reservation|social-network|train-ticket",
                    container!=""
                  }[5m])
                )
                /
                sum by (namespace, pod, container) (
                  rate(container_cpu_cfs_periods_total{
                    namespace=~"astronomy-shop|hotel-reservation|social-network|train-ticket",
                    container!=""
                  }[5m])
                ) > 0.25
              for: 2m
              labels:
                severity: warning
              annotations:
                summary: "CPU throttling: {{ $labels.pod }}/{{ $labels.container }}"
                description: "Container {{ $labels.container }} in pod {{ $labels.pod }} ({{ $labels.namespace }}) is being CPU throttled ({{ $value | humanizePercentage }} of periods throttled)."

        # ---- Golden signal alerts (from OTel spanmetrics) ----
        - name: app.goldensignal
          rules:
            - alert: HighRequestErrorRate
              # Fires when >10% of requests are errors, with a minimum request volume.
              # Excludes infrastructure services (load-generator, flagd, kafka, valkey-cart, postgresql).
              expr: |
                (
                  sum by (service_name, namespace) (
                    rate(traces_span_metrics_calls_total{
                      status_code="STATUS_CODE_ERROR",
                      service_name!~"load-generator|flagd|kafka|valkey-cart|postgresql",
                      namespace=~"astronomy-shop|hotel-reservation|blueprint-hotel-reservation|social-network"
                    }[2m])
                  )
                  /
                  sum by (service_name, namespace) (
                    rate(traces_span_metrics_calls_total{
                      service_name!~"load-generator|flagd|kafka|valkey-cart|postgresql",
                      namespace=~"astronomy-shop|hotel-reservation|blueprint-hotel-reservation|social-network"
                    }[2m])
                  )
                ) > 0.10
                  and
                sum by (service_name, namespace) (
                  rate(traces_span_metrics_calls_total{
                    service_name!~"load-generator|flagd|kafka|valkey-cart|postgresql",
                    namespace=~"astronomy-shop|hotel-reservation|blueprint-hotel-reservation|social-network"
                  }[2m])
                ) > 0.1
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "High error rate: {{ $labels.service_name }}"
                description: "Service {{ $labels.service_name }} in namespace {{ $labels.namespace }} has an elevated error rate (current: {{ $value | humanizePercentage }})."

            - alert: HighRequestErrorRate
              # Locust load generator error detection (train-ticket).
              # Fires when any endpoint has failures and enough requests to be meaningful.
              expr: |
                (
                  locust_requests_num_failures{namespace="train-ticket", name!="Aggregated"}
                    /
                  locust_requests_num_requests{namespace="train-ticket", name!="Aggregated"}
                ) > 0.1
                  and
                locust_requests_num_requests{namespace="train-ticket", name!="Aggregated"} > 0
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "High error rate: {{ $labels.method }} {{ $labels.name }}"
                description: "Endpoint {{ $labels.method }} {{ $labels.name }} in {{ $labels.namespace }} has an elevated failure ratio (current: {{ $value | printf \"%.2f\" }})."

            - alert: HighRequestErrorRate
              # Locust load generator error detection (astronomy-shop).
              # Fires when any endpoint has failures and enough requests to be meaningful.
              expr: |
                (
                  locust_requests_num_failures{namespace="astronomy-shop", name!="Aggregated"}
                    /
                  locust_requests_num_requests{namespace="astronomy-shop", name!="Aggregated"}
                ) > 0.1
                  and
                locust_requests_num_requests{namespace="astronomy-shop", name!="Aggregated"} > 0
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "High error rate: {{ $labels.method }} {{ $labels.name }}"
                description: "Endpoint {{ $labels.method }} {{ $labels.name }} in {{ $labels.namespace }} has an elevated failure ratio (current: {{ $value | printf \"%.2f\" }})."

            - alert: HighRequestRate
              # Detects abnormal traffic spikes (e.g. load generator flooding).
              # Fires when a single service receives >50 req/s sustained.
              # Suppressed while capacity_decrease_rpc_retry_storm is running
              # (detected via the "capacity-restraint" ResourceQuota that problem installs),
              # since a self-sustaining retry storm is the problem's expected symptom.
              expr: |
                sum by (service_name, namespace) (
                  rate(traces_span_metrics_calls_total{
                    service_name!~"load-generator|flagd|kafka|valkey-cart|postgresql",
                    namespace=~"astronomy-shop|hotel-reservation|blueprint-hotel-reservation|social-network"
                  }[2m])
                ) > 50
                unless
                count(kube_pod_info{namespace="blueprint-hotel-reservation"}) > 0
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "Abnormal request rate: {{ $labels.service_name }}"
                description: "Service {{ $labels.service_name }} in namespace {{ $labels.namespace }} is receiving an unusually high request rate (current: {{ $value | printf \"%.1f\" }} req/s)."

            - alert: HighRequestLatency
              expr: |
                histogram_quantile(0.95,
                  sum by (le, service_name, namespace) (
                    rate(traces_span_metrics_duration_milliseconds_bucket{
                      service_name!~"load-generator|flagd|kafka|valkey-cart|postgresql",
                      namespace=~"astronomy-shop|hotel-reservation|blueprint-hotel-reservation|social-network"
                    }[2m])
                  )
                ) > 3000
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "High latency: {{ $labels.service_name }}"
                description: "P95 latency for {{ $labels.service_name }} in namespace {{ $labels.namespace }} is above 1500ms (current: {{ $value | printf \"%.0f\" }}ms)."

            - alert: DeploymentNotReady
              expr: |
                kube_deployment_status_replicas_available{namespace=~"astronomy-shop|hotel-reservation|social-network|blueprint-hotel-reservation|train-ticket|tidb-cluster"} == 0
              for: 1m
              labels:
                severity: critical
              annotations:
                description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has 0 available replicas."
        # ---- Messaging / async processing alerts ----
        - name: app.messaging
          rules:
            - alert: MessageConsumerLag
              # Detects when individual message consumers fall behind producers.
              # Compares per-consumer "receive" rate to producer "publish" rate.
              # Normal: each consumer keeps pace with the producer (ratio ≈ 1.0).
              # Under lag: consumer falls behind (ratio > 1.5).
              expr: |
                (
                  sum by (namespace) (
                    rate(traces_span_metrics_calls_total{
                      service_name!~"load-generator|flagd|kafka|valkey-cart|postgresql",
                      namespace=~"astronomy-shop|hotel-reservation|blueprint-hotel-reservation|social-network",
                      span_name=~"publish .*"
                    }[5m])
                  )
                  /
                  clamp_min(
                    min by (namespace) (
                      sum by (namespace, service_name) (
                        rate(traces_span_metrics_calls_total{
                          service_name!~"load-generator|flagd|kafka|valkey-cart|postgresql",
                          namespace=~"astronomy-shop|hotel-reservation|blueprint-hotel-reservation|social-network",
                          span_name=~"receive .*"
                        }[5m])
                      )
                    ),
                    0.001
                  )
                ) > 1.5
              for: 2m
              labels:
                severity: warning
              annotations:
                summary: "Message consumer lag detected in {{ $labels.namespace }}"
                description: "Producers are outpacing the slowest consumer in {{ $labels.namespace }} by {{ $value | printf \"%.1f\" }}x. Messages may be accumulating in the queue."

        # ---- Blackbox endpoint probe alerts ----
        # Apps: astronomy-shop (16 endpoints), hotel-reservation (8 endpoints), social-network (13 endpoints)
        - name: app.endpoints
          rules:
            - alert: ServiceEndpointDown
              # Only fires if the deployment for that service has ready pods.
              expr: |
                label_replace(
                  probe_success{job=~"blackbox-(astronomy-shop|hotel-reservation|social-network)"} == 0,
                  "deployment", "$1", "instance", "([^.]+)\\..*"
                )
                  and on (namespace, deployment)
                (kube_deployment_status_replicas_available > 0)

              for: 1m
              labels:
                severity: critical
              annotations:
                description: "Service endpoint {{ $labels.instance }} in {{ $labels.namespace }} is unreachable."

            - alert: HTTPProbeFailure
              # Only fires when the nginx ingress controller is running
              # (deployed exclusively by the ingress_misroute problem).
              expr: |
                probe_success{job=~"blackbox-ingress-.*"} == 0
                  and on ()
                (kube_deployment_status_replicas_available{namespace="ingress-nginx", deployment="ingress-nginx-controller"} > 0)
              for: 30s
              labels:
                severity: critical
              annotations:
                summary: "HTTP probe failed in {{ $labels.namespace }}"
                description: "HTTP probe to {{ $labels.instance }} in {{ $labels.namespace }} is failing."


  #   - name: Instances
  #     rules:
  #       - alert: InstanceDown
  #         expr: up == 0
  #         for: 5m
  #         labels:
  #           severity: page
  #         annotations:
  #           description: '{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 5 minutes.'
  #           summary: 'Instance {{ $labels.instance }} down'
  ## DEPRECATED DEFAULT VALUE, unless explicitly naming your files, please use alerting_rules.yml
  alerts: {}

  ## Records configuration
  ## Ref: https://prometheus.io/docs/prometheus/latest/configuration/recording_rules/
  recording_rules.yml: {}
  ## DEPRECATED DEFAULT VALUE, unless explicitly naming your files, please use recording_rules.yml
  rules: {}

  prometheus.yml:
    rule_files:
      - /etc/config/recording_rules.yml
      - /etc/config/alerting_rules.yml
    ## Below two files are DEPRECATED will be removed from this default values file
      - /etc/config/rules
      - /etc/config/alerts

    scrape_configs:
      - job_name: 'kube-state-metrics'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          # Only scrape the service named 'prometheus-kube-state-metrics'
          # (Note: Check your actual service name; it might just be 'kube-state-metrics')
          - source_labels: [__meta_kubernetes_endpoints_name]
            action: keep
            regex: .*kube-state-metrics.*
      - job_name: prometheus-self
        static_configs:
          - targets:
            - localhost:9090

      - job_name: 'kubernetes-cadvisor'

        # Default to scraping over https. If required, just disable this or change to
        # `http`.
        scheme: https

        # This TLS & bearer token file config is used to connect to the actual scrape
        # endpoints for cluster components. This is separate to discovery auth
        # configuration because discovery & scraping are two separate concerns in
        # Prometheus. The discovery auth config is automatic if Prometheus runs inside
        # the cluster. Otherwise, more config options have to be provided within the
        # <kubernetes_sd_config>.
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          # If your node certificates are self-signed or use a different CA to the
          # master CA, then disable certificate verification below. Note that
          # certificate verification is an integral part of a secure infrastructure
          # so this should only be disabled in a controlled environment. You can
          # disable certificate verification by uncommenting the line below.
          #
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

        kubernetes_sd_configs:
          - role: node

        # This configuration will work only on kubelet 1.7.3+
        # As the scrape endpoints for cAdvisor have changed
        # if you are using older version you need to change the replacement to
        # replacement: /api/v1/nodes/$1:4194/proxy/metrics
        # more info here https://github.com/coreos/prometheus-operator/issues/633
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
        - source_labels: [__meta_kubernetes_endpoints_name]
          regex: 'prometheus-prometheus-node-exporter'
          action: keep

# adds additional scrape configs to prometheus.yml
# must be a string so you have to add a | after extraScrapeConfigs:
# example adds prometheus-blackbox-exporter scrape config
extraScrapeConfigs: |
  # ---- Blackbox TCP probes for app service endpoints ----
  # Probes each service's ClusterIP:port via the blackbox exporter.

  - job_name: 'blackbox-astronomy-shop'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - ad.astronomy-shop:8080
          - cart.astronomy-shop:8080
          - checkout.astronomy-shop:8080
          - currency.astronomy-shop:8080
          - email.astronomy-shop:8080
          - frontend.astronomy-shop:8080
          - frontend-proxy.astronomy-shop:8080
          - image-provider.astronomy-shop:8081
          - payment.astronomy-shop:8080
          - product-catalog.astronomy-shop:8080
          - product-reviews.astronomy-shop:3551
          - quote.astronomy-shop:8080
          - recommendation.astronomy-shop:8080
          - shipping.astronomy-shop:8080
          - flagd.astronomy-shop:8013
          - kafka.astronomy-shop:9092
        labels:
          namespace: astronomy-shop
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prometheus-prometheus-blackbox-exporter:9115

  - job_name: 'blackbox-hotel-reservation'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - frontend.hotel-reservation:5000
          - search.hotel-reservation:8082
          - profile.hotel-reservation:8081
          - geo.hotel-reservation:8083
          - rate.hotel-reservation:8084
          - recommendation.hotel-reservation:8085
          - user.hotel-reservation:8086
          - reservation.hotel-reservation:8087
        labels:
          namespace: hotel-reservation
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prometheus-prometheus-blackbox-exporter:9115

  - job_name: 'blackbox-social-network'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - nginx-thrift.social-network:8080
          - media-frontend.social-network:8081
          - user-service.social-network:9090
          - compose-post-service.social-network:9090
          - social-graph-service.social-network:9090
          - post-storage-service.social-network:9090
          - user-timeline-service.social-network:9090
          - url-shorten-service.social-network:9090
          - text-service.social-network:9090
          - unique-id-service.social-network:9090
          - user-mention-service.social-network:9090
          - home-timeline-service.social-network:9090
          - media-service.social-network:9090
        labels:
          namespace: social-network
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prometheus-prometheus-blackbox-exporter:9115
  # ---- Ingress HTTP probes ----
  - job_name: 'blackbox-ingress-hotel-reservation'
    metrics_path: /probe
    params:
      module: [http_2xx]
    scrape_interval: 15s
    static_configs:
      - targets:
          - http://ingress-nginx-controller.ingress-nginx/api/hotels?inDate=2015-04-09&outDate=2015-04-10&lat=38.0235&lon=-122.095
        labels:
          namespace: hotel-reservation
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prometheus-prometheus-blackbox-exporter:9115

  # ---- Locust load generator metrics ----
  - job_name: 'locust-astronomy-shop'
    scrape_interval: 15s
    static_configs:
      - targets:
          - load-generator.astronomy-shop:9646
        labels:
          namespace: astronomy-shop

  - job_name: 'locust-train-ticket'
    scrape_interval: 15s
    static_configs:
      - targets:
          - load-generator.train-ticket:9646
        labels:
          namespace: train-ticket

  # ---- OTel Collector spanmetrics (Jaeger traces — blueprint-hotel-reservation, social-network) ----
  - job_name: 'otel-spanmetrics'
    scrape_interval: 15s
    static_configs:
      - targets:
          - otel-collector.observe:8889
    metric_relabel_configs:
      # Strip "unknown_service:" prefix and "_process" suffix from blueprint-hotel-reservation service names
      # e.g. unknown_service:frontend_service_process -> frontend_service
      - source_labels: [service_name]
        regex: 'unknown_service:(.+)_process'
        target_label: service_name
        replacement: '$1'
      # Drop wlgen metrics — not a real service
      - source_labels: [service_name]
        regex: 'unknown_service:wlgen_proc'
        action: drop
      # Default namespace for blueprint-hotel-reservation services
      - target_label: namespace
        replacement: blueprint-hotel-reservation
      # Override for social-network services
      - source_labels: [service_name]
        regex: 'nginx-thrift|compose-post-service|social-graph-service|post-storage-service|user-timeline-service|url-shorten-service|text-service|unique-id-service|user-mention-service|home-timeline-service|media-service|media-frontend|user-service'
        target_label: namespace
        replacement: social-network

  # ---- OTel Collector spanmetrics (OTLP traces — astronomy-shop) ----
  - job_name: 'otel-spanmetrics-otlp'
    scrape_interval: 15s
    static_configs:
      - targets:
          - otel-collector.observe:8890
        labels:
          namespace: astronomy-shop
  # ---- Scraping from TiDB Cluster ----
  - job_name: tidb-cluster
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets:
          - basic-tidb.tidb-cluster.svc.cluster.local:10080
          - basic-pd.tidb-cluster.svc.cluster.local:2379

# Adds option to add alert_relabel_configs to avoid duplicate alerts in alertmanager
# useful in H/A prometheus with different external labels but the same alerts
alertRelabelConfigs: {}
  # alert_relabel_configs:
  # - source_labels: [dc]
  #   regex: (.+)\d+
  #   target_label: dc

networkPolicy:
  ## Enable creation of NetworkPolicy resources.
  ##
  enabled: false

# Force namespace of namespaced resources
forceNamespace: ""

# Extra manifests to deploy as an array
extraManifests: []
  # - |
  #   apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #   labels:
  #     name: prometheus-extra
  #   data:
